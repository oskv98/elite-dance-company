name = "elite-dance-company-cron"
main = "worker.js"
compatibility_date = "2026-07-01"

[triggers]
# Todos los días a las 12:00 UTC = 8:00 a.m. hora de Venezuela (UTC-4) -> chequeo de vencimientos
# Cada 5 minutos -> chequeo de recordatorios de clase (30 min y 5 min antes)
crons = ["0 12 * * *", "*/5 * * * *"]

# Configura el secreto con:
#   npx wrangler secret put CRON_SECRET
# (debe ser el mismo valor que pusiste como CRON_SECRET en las
#  variables de entorno de tu proyecto de Cloudflare Pages)